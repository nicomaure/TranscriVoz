# Agregar este bloque dentro del server {} existente en /etc/nginx/sites-available/default
# sudo nano /etc/nginx/sites-available/default

location /transcriptor/ {
    proxy_pass http://unix:/tmp/transcriptor-groq.sock;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header SCRIPT_NAME /transcriptor;

    # SSE support - no buffering
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;

    # Large uploads - no buffering en RAM
    client_max_body_size 1G;
    proxy_request_buffering off;
}
