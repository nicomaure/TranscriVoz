# Configuracion de Nginx para TranscriVoz
#
# 1. Agregar el bloque "upstream" FUERA del bloque server {}
# 2. Agregar el bloque "location" DENTRO del bloque server {} que maneja HTTPS (443)
# 3. Importante: editar sites-enabled, no sites-available (o verificar que sea un symlink)
#
# sudo nano /etc/nginx/sites-enabled/default
# sudo nginx -t && sudo systemctl reload nginx

# --- Agregar FUERA del server {} ---

upstream transcriptor_backend {
    server unix:/tmp/transcriptor-groq.sock;
}

# --- Agregar DENTRO del server {} que tiene listen 443 ssl ---

location /transcriptor/ {
    proxy_pass http://transcriptor_backend/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /transcriptor;

    # SSE support - no buffering
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;

    # Uploads grandes - no buffering en RAM
    client_max_body_size 1G;
    proxy_request_buffering off;
}
